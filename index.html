<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roah — Robot Control System</title>
  <meta name="description" content="Roah AI Robot Control System — Secure login portal for accessing advanced robot controls, live camera feed, GPS navigation, and voice assistant.">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Animated Background -->
  <div class="animated-bg"></div>

  <!-- Particle System -->
  <div class="particles-container">
    <canvas id="particles-canvas"></canvas>
  </div>

  <!-- Login Card -->
  <div class="login-container">
    <div class="login-card glow-cyan">

      <!-- Logo -->
      <div class="login-logo">
        <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="32" cy="32" r="30" stroke="url(#logoGrad)" stroke-width="2" fill="none"/>
          <circle cx="32" cy="32" r="22" stroke="url(#logoGrad)" stroke-width="1" fill="none" opacity="0.4"/>
          <circle cx="24" cy="28" r="3" fill="#00d4ff"/>
          <circle cx="40" cy="28" r="3" fill="#00d4ff"/>
          <path d="M24 40 Q32 46 40 40" stroke="#a855f7" stroke-width="2" fill="none" stroke-linecap="round"/>
          <line x1="32" y1="2" x2="32" y2="10" stroke="#00d4ff" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="32" cy="2" r="2" fill="#00d4ff"/>
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="64" y2="64">
              <stop offset="0%" stop-color="#00d4ff"/>
              <stop offset="100%" stop-color="#a855f7"/>
            </linearGradient>
          </defs>
        </svg>
      </div>

      <!-- Title -->
      <h1 class="login-title">ROAH SYSTEM ACCESS</h1>
      <p class="login-subtitle">Enter master password to unlock robot controls</p>

      <!-- Login Form -->
      <form id="login-form">
        <div class="input-group">
          <label for="master-password">Master Password</label>
          <input
            type="password"
            id="master-password"
            class="input-glow"
            placeholder="••••••••"
            required
            autofocus
            autocomplete="current-password"
          >
        </div>
        <button class="btn-primary" type="submit" id="btn-login">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          Unlock System
        </button>
      </form>

      <!-- Error Message -->
      <div id="login-error" class="login-error hidden"></div>

    </div>
  </div>

  <script>
    /* ─── Master Password (local check — no server needed) ─── */
    const MASTER_PASSWORD = '20141982';

    /* ─── Already logged in? Skip to dashboard ─── */
    if (sessionStorage.getItem('roah_auth') === 'true') {
      window.location.href = 'dashboard.html';
    }

    /* ─── Login Handler ─── */
    const loginForm   = document.getElementById('login-form');
    const loginError  = document.getElementById('login-error');
    const passwordInput = document.getElementById('master-password');

    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      loginError.classList.add('hidden');
      loginError.classList.remove('shake');

      const password = passwordInput.value.trim();
      if (!password) return;

      if (password === MASTER_PASSWORD) {
        sessionStorage.setItem('roah_auth', 'true');
        window.location.href = 'dashboard.html';
      } else {
        loginError.textContent = '🔒 Access denied. Invalid password.';
        loginError.classList.remove('hidden');
        void loginError.offsetWidth;
        loginError.classList.add('shake');
        passwordInput.value = '';
        passwordInput.focus();
      }
    });

    /* ─── Particle System ─── */
    (function initParticles() {
      const canvas = document.getElementById('particles-canvas');
      const ctx = canvas.getContext('2d');
      let particles = [];
      const PARTICLE_COUNT = 80;
      const CONNECT_DISTANCE = 120;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      class Particle {
        constructor() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.vx = (Math.random() - 0.5) * 0.4;
          this.vy = (Math.random() - 0.5) * 0.4;
          this.radius = Math.random() * 1.5 + 0.5;
          this.opacity = Math.random() * 0.4 + 0.1;
        }
        update() {
          this.x += this.vx;
          this.y += this.vy;
          if (this.x < 0 || this.x > canvas.width)  this.vx *= -1;
          if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
          ctx.fillStyle = `rgba(0, 212, 255, ${this.opacity})`;
          ctx.fill();
        }
      }

      for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

      function drawConnections() {
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < CONNECT_DISTANCE) {
              const opacity = (1 - dist / CONNECT_DISTANCE) * 0.15;
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.strokeStyle = `rgba(0, 212, 255, ${opacity})`;
              ctx.lineWidth = 0.5;
              ctx.stroke();
            }
          }
        }
      }

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        drawConnections();
        requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>

</body>
</html>
